name: thyroid_tracker
description: Local-first hypothyroidism management app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.0
  go_router: ^14.6.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  pdf: ^3.12.0
  printing: ^5.14.3
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
